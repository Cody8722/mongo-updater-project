<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB 日曆更新小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
        }
        /* 日曆格子的基本樣式 */
        .calendar-day {
            transition: background-color 0.2s;
        }
        /* 當日期被選中時的樣式 */
        .calendar-day.selected {
            background-color: #3b82f6;
            color: white !important; /* 使用 !important 來覆蓋其他顏色設定 */
            border-radius: 50%;
        }
        /* 假日與週末的顏色 */
        .holiday, .weekend {
            color: #ef4444; /* 紅色 */
        }
        /* 補班日的顏色 */
        .workday {
            color: #6b7280; /* 灰色 */
        }
        /* 狀態指示燈 */
        #db-status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            transition: background-color 0.3s;
        }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold text-center mb-6">MongoDB 假日設定小幫手</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左側日曆區 -->
            <div class="lg:col-span-2">
                <!-- 月份切換 -->
                <div class="flex justify-between items-center mb-4">
                    <button id="prev-month" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">&lt; 上個月</button>
                    <h2 id="month-year" class="text-xl font-semibold"></h2>
                    <button id="next-month" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">下個月 &gt;</button>
                </div>

                <!-- 星期標頭 -->
                <div class="grid grid-cols-7 gap-2 text-center font-medium text-gray-600 mb-2">
                    <div class="text-red-500">日</div>
                    <div>一</div>
                    <div>二</div>
                    <div>三</div>
                    <div>四</div>
                    <div>五</div>
                    <div class="text-red-500">六</div>
                </div>

                <!-- 日期格子區 -->
                <div id="calendar-days" class="grid grid-cols-7 gap-2">
                    <!-- Calendar days will be generated by JavaScript -->
                </div>
            </div>

            <!-- 右側編輯區 -->
            <div class="lg:col-span-1 border-t lg:border-t-0 lg:border-l pt-6 lg:pt-0 lg:pl-8">
                <h2 class="text-lg font-bold mb-4">編輯日期資料</h2>
                <form id="holiday-form" class="space-y-4">
                    <div>
                        <label for="date-id" class="block text-sm font-medium text-gray-700">日期 ID (_id)</label>
                        <input type="text" id="date-id" name="date-id" readonly class="mt-1 block w-full bg-gray-100 border-gray-300 rounded-md shadow-sm p-2">
                    </div>
                    <div>
                        <label for="holiday-name" class="block text-sm font-medium text-gray-700">假日名稱 (name)</label>
                        <input type="text" id="holiday-name" name="holiday-name" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-2" placeholder="例如：春節">
                    </div>
                    <div class="flex items-center">
                        <input id="is-holiday" name="is-holiday" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                        <label for="is-holiday" class="ml-2 block text-sm text-gray-900">
                            標示為假日 (isHoliday)
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600">
                        儲存變更
                    </button>
                </form>
                <div id="response-message" class="mt-4 text-center text-sm font-medium"></div>
            </div>
        </div>
    </div>
    
    <!-- 頁尾狀態顯示 -->
    <div class="fixed bottom-4 right-4 flex items-center space-x-2 bg-white py-2 px-3 rounded-full shadow-lg">
        <div id="db-status-indicator" class="bg-gray-400"></div>
        <span id="db-status-text" class="text-xs text-gray-600 font-medium">正在檢查...</span>
    </div>

<script>
    // --- 設定區 ---
    const backendUrl = 'https://backend1.zeabur.app'; // Zeabur 後端服務的公開網址

    // --- DOM 元素 ---
    const monthYearEl = document.getElementById('month-year');
    const calendarDaysEl = document.getElementById('calendar-days');
    const prevMonthBtn = document.getElementById('prev-month');
    const nextMonthBtn = document.getElementById('next-month');
    const holidayForm = document.getElementById('holiday-form');
    const dateIdInput = document.getElementById('date-id');
    const holidayNameInput = document.getElementById('holiday-name');
    const isHolidayCheckbox = document.getElementById('is-holiday');
    const responseMessageEl = document.getElementById('response-message');
    const dbStatusIndicator = document.getElementById('db-status-indicator');
    const dbStatusText = document.getElementById('db-status-text');

    // --- 狀態變數 ---
    let currentDate = new Date();
    let holidaysData = {};
    let selectedDateElement = null;

    // --- 函式區 ---

    function formatDateToId(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}${month}${day}`;
    }

    async function fetchHolidays(year, month) {
        try {
            const response = await fetch(`${backendUrl}/get_holidays?year=${year}&month=${month}`);
            if (!response.ok) throw new Error('無法獲取資料');
            const data = await response.json();
            holidaysData = {};
            data.forEach(holiday => {
                holidaysData[holiday._id] = holiday;
            });
            renderCalendar();
        } catch (error) {
            console.error('Fetch holidays error:', error);
            responseMessageEl.textContent = `讀取錯誤: ${error.message}`;
        }
    }

    function renderCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();

        monthYearEl.textContent = `${year}年 ${month + 1}月`;
        calendarDaysEl.innerHTML = '';

        const firstDayOfMonth = new Date(year, month, 1);
        const startDay = firstDayOfMonth.getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < startDay; i++) {
            calendarDaysEl.appendChild(document.createElement('div'));
        }

        for (let day = 1; day <= daysInMonth; day++) {
            const dateCell = document.createElement('div');
            dateCell.className = 'calendar-day h-10 flex items-center justify-center cursor-pointer';
            
            const tempDate = new Date(year, month, day);
            const dateId = formatDateToId(tempDate);
            const dayOfWeek = tempDate.getDay();

            dateCell.textContent = day;
            dateCell.dataset.dateId = dateId;

            // --- 智慧上色邏輯 ---
            const holidayInfo = holidaysData[dateId];
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

            if (holidayInfo) {
                // 如果資料庫有這天的資料
                if (holidayInfo.isHoliday) {
                    dateCell.classList.add('holiday'); // 標示為假日
                } else {
                    dateCell.classList.add('workday'); // 標示為補班日
                }
            } else if (isWeekend) {
                // 如果資料庫沒資料，但本身是週末
                dateCell.classList.add('weekend');
            }

            dateCell.addEventListener('click', () => {
                if (selectedDateElement) {
                    selectedDateElement.classList.remove('selected');
                }
                dateCell.classList.add('selected');
                selectedDateElement = dateCell;

                dateIdInput.value = dateId;
                const data = holidaysData[dateId];
                if (data) {
                    holidayNameInput.value = data.name || '';
                    isHolidayCheckbox.checked = data.isHoliday;
                } else {
                    holidayNameInput.value = '';
                    isHolidayCheckbox.checked = isWeekend;
                }
            });

            calendarDaysEl.appendChild(dateCell);
        }
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        const dateId = dateIdInput.value;
        if (!dateId) {
            responseMessageEl.textContent = '請先選擇一個日期';
            responseMessageEl.style.color = 'red';
            return;
        }

        const data = {
            _id: dateId,
            name: holidayNameInput.value,
            isHoliday: isHolidayCheckbox.checked
        };
        
        responseMessageEl.textContent = '儲存中...';
        responseMessageEl.style.color = 'gray';

        try {
            const response = await fetch(`${backendUrl}/update_holiday`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data),
            });
            const result = await response.json();
            if (response.ok) {
                responseMessageEl.textContent = result.message || '儲存成功！';
                responseMessageEl.style.color = 'green';
                fetchHolidays(currentDate.getFullYear(), currentDate.getMonth() + 1);
            } else {
                throw new Error(result.error || '儲存失敗');
            }
        } catch (error) {
            console.error('Submit error:', error);
            responseMessageEl.textContent = `錯誤: ${error.message}`;
            responseMessageEl.style.color = 'red';
        }
    }
    
    async function checkDbStatus() {
        try {
            const response = await fetch(`${backendUrl}/status`);
            const data = await response.json();
            if (response.ok && data.db_status === 'connected') {
                dbStatusIndicator.style.backgroundColor = '#22c55e'; // green-500
                dbStatusText.textContent = '連線正常';
            } else {
                throw new Error(data.db_status || '連線狀態未知');
            }
        } catch (error) {
            dbStatusIndicator.style.backgroundColor = '#ef4444'; // red-500
            dbStatusText.textContent = '連線異常';
            console.error('DB Status Check Error:', error);
        }
    }

    // --- 事件監聽 ---
    prevMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        fetchHolidays(currentDate.getFullYear(), currentDate.getMonth() + 1);
    });

    nextMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        fetchHolidays(currentDate.getFullYear(), currentDate.getMonth() + 1);
    });

    holidayForm.addEventListener('submit', handleFormSubmit);

    // --- 初始載入 ---
    document.addEventListener('DOMContentLoaded', () => {
        fetchHolidays(currentDate.getFullYear(), currentDate.getMonth() + 1);
        checkDbStatus();
    });
</script>
</body>
</html>

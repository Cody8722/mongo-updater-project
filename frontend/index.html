<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MongoDB 日曆更新小幫手 (全端版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #f0f2f5; }
        .form-label { @apply block text-sm font-medium text-gray-700 mb-1; }
        .form-input { @apply block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm; }
        .btn { @apply inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white disabled:opacity-50 disabled:cursor-not-allowed; }
        .btn-primary { @apply bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; color: white; font-weight: 500; z-index: 50; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none; }
        .toast.show { opacity: 1; transform: translate(-50%, -10px); }
        .toast.success { background-color: #28a745; }
        .toast.error { background-color: #dc3545; }
        /* 日曆樣式 */
        .calendar-day { @apply flex items-center justify-center h-10 w-10 rounded-full cursor-pointer transition-colors duration-200; }
        .calendar-day.today { @apply bg-indigo-100 text-indigo-600 font-bold; }
        .calendar-day.selected { @apply bg-indigo-600 text-white shadow-lg; }
        .calendar-day:not(.empty):hover { @apply bg-gray-200; }
        .calendar-day.is-holiday { @apply bg-red-400 text-white; }
        .calendar-day.is-workday { @apply bg-gray-400 text-white; }
        .calendar-day.is-holiday.selected, .calendar-day.is-workday.selected { @apply ring-2 ring-offset-2 ring-yellow-400; }
        /* 連線狀態樣式 */
        #db-status.connected { @apply bg-green-100 text-green-800; }
        #db-status.connected #db-status-dot { @apply bg-green-500; }
        #db-status.disconnected { @apply bg-red-100 text-red-800; }
        #db-status.disconnected #db-status-dot { @apply bg-red-500; }
        #db-status.checking { @apply bg-yellow-100 text-yellow-800; }
        #db-status.checking #db-status-dot { @apply bg-yellow-500 animate-pulse; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-lg grid grid-cols-1 md:grid-cols-2 gap-8">
        <!-- 左側：日曆 -->
        <div>
             <div class="flex items-center justify-between mb-4">
                <button id="prev-month-btn" class="p-2 rounded-full hover:bg-gray-100">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <h2 id="current-month-year" class="text-xl font-bold text-gray-800"></h2>
                <button id="next-month-btn" class="p-2 rounded-full hover:bg-gray-100">
                    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
            <div id="calendar-weekdays" class="grid grid-cols-7 gap-2 text-center text-sm text-gray-500 mb-2">
                <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7 gap-2">
                <!-- 日期將由 JavaScript 動態生成 -->
            </div>
        </div>

        <!-- 右側：表單 -->
        <div>
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-gray-900">編輯日期</h1>
                <p id="selected-date-display" class="mt-1 text-md text-gray-600">請從左側選擇日期</p>
            </div>
            <form id="mongo-form">
                <div class="space-y-6">
                    <div>
                        <label for="holiday-name" class="form-label">假日/事件名稱</label>
                        <input type="text" id="holiday-name" class="form-input" placeholder="例如：國慶日">
                    </div>
                    <div>
                        <label class="form-label">狀態</label>
                        <div class="flex items-center space-x-4">
                            <div class="flex items-center">
                                <input id="is-holiday-true" name="isHoliday" type="radio" checked class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500">
                                <label for="is-holiday-true" class="ml-2 block text-sm text-gray-900">是假日</label>
                            </div>
                            <div class="flex items-center">
                                <input id="is-holiday-false" name="isHoliday" type="radio" class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500">
                                <label for="is-holiday-false" class="ml-2 block text-sm text-gray-900">不是假日 (補班日)</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="text-center mt-8">
                    <button type="submit" id="submit-button" class="btn btn-primary w-full md:w-auto" disabled>
                        <span id="button-text">選擇日期以編輯</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <div id="toast-notification" class="toast"></div>

    <!-- 【新功能】 資料庫連線狀態顯示器 -->
    <div id="db-status" class="fixed bottom-4 right-4 flex items-center space-x-2 px-3 py-2 rounded-full text-sm font-medium shadow-md">
        <div id="db-status-dot" class="w-3 h-3 rounded-full"></div>
        <span id="db-status-text"></span>
    </div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    // --- 常數與變數設定 ---
    const backendUrl = 'https://backend1.zeabur.app';
    let currentDate = new Date();
    let selectedDate = null;
    let holidaysData = {};

    // --- DOM 元素 ---
    const monthYearDisplay = document.getElementById('current-month-year');
    const calendarGrid = document.getElementById('calendar-grid');
    const prevMonthBtn = document.getElementById('prev-month-btn');
    const nextMonthBtn = document.getElementById('next-month-btn');
    const form = document.getElementById('mongo-form');
    const holidayNameInput = document.getElementById('holiday-name');
    const isHolidayTrueRadio = document.getElementById('is-holiday-true');
    const isHolidayFalseRadio = document.getElementById('is-holiday-false');
    const selectedDateDisplay = document.getElementById('selected-date-display');
    const submitButton = document.getElementById('submit-button');
    const buttonText = document.getElementById('button-text');
    const toast = document.getElementById('toast-notification');
    const dbStatusIndicator = document.getElementById('db-status');
    const dbStatusDot = document.getElementById('db-status-dot');
    const dbStatusText = document.getElementById('db-status-text');

    // --- 主要功能函式 ---
    
    // 【新功能】 檢測資料庫連線狀態
    async function checkDbStatus() {
        dbStatusIndicator.className = 'fixed bottom-4 right-4 flex items-center space-x-2 px-3 py-2 rounded-full text-sm font-medium shadow-md checking';
        dbStatusText.textContent = '正在檢查連線...';
        try {
            const response = await fetch(`${backendUrl}/api/status`);
            const result = await response.json();
            if (!response.ok) throw new Error(result.message);
            
            dbStatusIndicator.className = 'fixed bottom-4 right-4 flex items-center space-x-2 px-3 py-2 rounded-full text-sm font-medium shadow-md connected';
            dbStatusText.textContent = '資料庫已連線';

        } catch (error) {
            dbStatusIndicator.className = 'fixed bottom-4 right-4 flex items-center space-x-2 px-3 py-2 rounded-full text-sm font-medium shadow-md disconnected';
            dbStatusText.textContent = '資料庫連線失敗';
            console.error('DB Status Check Error:', error);
            showToast('無法連接到後端服務或資料庫', 'error');
        }
    }

    // 取得指定月份的假日資料
    async function fetchHolidays(year, month) {
        // ... (此函式內容不變)
        try {
            const response = await fetch(`${backendUrl}/api/get_holidays?year=${year}&month=${month}`);
            if (!response.ok) throw new Error('無法取得資料');
            const result = await response.json();
            holidaysData = result.data.reduce((acc, holiday) => {
                acc[holiday._id] = holiday;
                return acc;
            }, {});
        } catch (error) {
            showToast(error.message, 'error');
            holidaysData = {};
        }
    }

    // 渲染日曆
    async function renderCalendar() {
        // ... (此函式內容不變)
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        monthYearDisplay.textContent = `${year} 年 ${month + 1} 月`;
        calendarGrid.innerHTML = '<div class="col-span-7 h-10 flex items-center justify-center"><div class="animate-spin rounded-full h-6 w-6 border-b-2 border-indigo-500"></div></div>';
        await fetchHolidays(year, month + 1);
        calendarGrid.innerHTML = '';
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const today = new Date();
        for (let i = 0; i < firstDayOfMonth; i++) {
            calendarGrid.insertAdjacentHTML('beforeend', '<div class="calendar-day empty"></div>');
        }
        for (let day = 1; day <= daysInMonth; day++) {
            const date = new Date(year, month, day);
            const dateId = `${year}${String(month + 1).padStart(2, '0')}${String(day).padStart(2, '0')}`;
            const holidayInfo = holidaysData[dateId];
            const dayElement = document.createElement('div');
            dayElement.textContent = day;
            dayElement.classList.add('calendar-day');
            dayElement.dataset.date = date.toISOString().split('T')[0];
            if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
                dayElement.classList.add('today');
            }
            if (holidayInfo) {
                dayElement.classList.add(holidayInfo.isHoliday ? 'is-holiday' : 'is-workday');
            }
            if (selectedDate && date.toISOString().split('T')[0] === selectedDate) {
                dayElement.classList.add('selected');
            }
            dayElement.addEventListener('click', () => handleDateClick(date));
            calendarGrid.appendChild(dayElement);
        }
    }

    // 處理日期點擊事件
    function handleDateClick(date) {
        // ... (此函式內容不變)
        selectedDate = date.toISOString().split('T')[0];
        const dateId = selectedDate.replace(/-/g, '');
        const holidayInfo = holidaysData[dateId];
        selectedDateDisplay.textContent = `編輯中: ${selectedDate}`;
        if (holidayInfo) {
            holidayNameInput.value = holidayInfo.name;
            isHolidayTrueRadio.checked = holidayInfo.isHoliday;
            isHolidayFalseRadio.checked = !holidayInfo.isHoliday;
        } else {
            holidayNameInput.value = '';
            isHolidayTrueRadio.checked = true;
        }
        document.querySelectorAll('.calendar-day.selected').forEach(el => el.classList.remove('selected'));
        const targetDay = document.querySelector(`.calendar-day[data-date="${selectedDate}"]`);
        if (targetDay) targetDay.classList.add('selected');
        submitButton.disabled = false;
        buttonText.textContent = '儲存變更';
    }

    // 處理表單提交
    form.addEventListener('submit', async function(e) {
        // ... (此函式內容不變)
        e.preventDefault();
        if (!selectedDate) {
            showToast('請先選擇一個日期', 'error');
            return;
        }
        submitButton.disabled = true;
        buttonText.textContent = '儲存中...';
        const requestBody = {
            id: selectedDate.replace(/-/g, ''),
            payload: {
                "$set": {
                    name: holidayNameInput.value.trim(),
                    isHoliday: isHolidayTrueRadio.checked,
                    date: selectedDate
                }
            }
        };
        try {
            const response = await fetch(`${backendUrl}/api/update_holiday`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody),
            });
            const result = await response.json();
            if (!response.ok) throw new Error(result.message);
            showToast(result.message, 'success');
            await renderCalendar();
        } catch (error) {
            showToast(error.message, 'error');
        } finally {
            submitButton.disabled = false;
            buttonText.textContent = '儲存變更';
        }
    });

    // --- 事件監聽器 ---
    prevMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    });
    nextMonthBtn.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    });

    // --- 工具函式 ---
    let toastTimeout;
    function showToast(message, type = 'success') {
        clearTimeout(toastTimeout);
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // --- 初始化 ---
    checkDbStatus(); // 頁面載入時檢查連線
    renderCalendar();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中控台儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .tab-btn { @apply px-4 py-2 font-medium text-sm rounded-t-lg transition-colors duration-200; }
        .tab-btn.active { @apply bg-white text-indigo-600; }
        .tab-btn:not(.active) { @apply text-gray-500 hover:bg-gray-200; }
        .tab-content { @apply hidden; }
        .tab-content.active { @apply block; }
        .calendar-day { transition: background-color 0.2s; }
        .calendar-day.selected { background-color: #3b82f6; color: white !important; border-radius: 50%; }
        .holiday, .weekend { color: #ef4444; }
        .workday { color: #6b7280; }
        #db-status-indicator { width: 10px; height: 10px; border-radius: 50%; transition: background-color 0.3s; }
        .log-entry { @apply bg-gray-50 p-4 rounded-md border border-gray-200; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-2 text-gray-800">中控台儀表板</h1>
        <p class="text-center text-gray-500 mb-6">一個集中管理您所有服務設定的地方。</p>
        
        <!-- Tab Buttons -->
        <div class="border-b border-gray-200">
            <nav class="flex -mb-px" aria-label="Tabs">
                <button class="tab-btn active" data-tab="calendar">日曆假日設定</button>
                <button class="tab-btn" data-tab="admin-logs">管理員日誌</button>
            </nav>
        </div>

        <!-- Tab Content Area -->
        <div class="bg-white p-6 rounded-b-lg rounded-r-lg shadow-md">
            
            <!-- Tab 1: Calendar Holiday Settings -->
            <div id="calendar-content" class="tab-content active">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- 左側日曆區 -->
                    <div class="lg:col-span-2">
                        <div class="flex justify-between items-center mb-4">
                            <button id="prev-month" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">&lt; 上個月</button>
                            <h2 id="month-year" class="text-xl font-semibold"></h2>
                            <button id="next-month" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300">下個月 &gt;</button>
                        </div>
                        <div class="grid grid-cols-7 gap-2 text-center font-medium text-gray-600 mb-2">
                            <div class="text-red-500">日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div class="text-red-500">六</div>
                        </div>
                        <div id="calendar-days" class="grid grid-cols-7 gap-2"></div>
                    </div>
                    <!-- 右側編輯區 -->
                    <div class="lg:col-span-1 border-t lg:border-t-0 lg:border-l pt-6 lg:pt-0 lg:pl-8">
                        <h2 class="text-lg font-bold mb-4">編輯日期資料</h2>
                        <form id="holiday-form" class="space-y-4">
                            <div>
                                <label for="date-id" class="block text-sm font-medium text-gray-700">日期 ID (_id)</label>
                                <input type="text" id="date-id" readonly class="mt-1 block w-full bg-gray-100 p-2 border-gray-300 rounded-md">
                            </div>
                            <div>
                                <label for="holiday-name" class="block text-sm font-medium text-gray-700">假日名稱 (name)</label>
                                <input type="text" id="holiday-name" class="mt-1 block w-full p-2 border-gray-300 rounded-md" placeholder="例如：春節">
                            </div>
                            <div class="flex items-center"><input id="is-holiday" type="checkbox" class="h-4 w-4"><label for="is-holiday" class="ml-2">標示為假日 (isHoliday)</label></div>
                            <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-md hover:bg-blue-600">儲存變更</button>
                        </form>
                        <div id="response-message" class="mt-4 text-center"></div>
                    </div>
                </div>
            </div>

            <!-- Tab 2: Admin Logs -->
            <div id="admin-logs-content" class="tab-content">
                <div class="space-y-4">
                    <h2 class="text-xl font-bold">查詢解壓縮日誌</h2>
                    <div class="flex items-end space-x-2">
                         <div class="flex-grow">
                             <label for="admin-secret" class="block text-sm font-medium text-gray-700">管理員密碼</label>
                             <input type="password" id="admin-secret" class="mt-1 block w-full p-2 border border-gray-300 rounded-md" placeholder="請輸入您的 ADMIN_SECRET">
                         </div>
                         <button id="fetch-logs-btn" class="bg-indigo-600 text-white px-5 py-2 rounded-md hover:bg-indigo-700">查詢</button>
                    </div>
                    <div id="logs-output" class="mt-6 space-y-4">
                        <p class="text-gray-500">請輸入密碼後點擊查詢來獲取日誌。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Floating Status Indicator -->
    <div class="fixed bottom-4 right-4 flex items-center space-x-2 bg-white py-2 px-3 rounded-full shadow-lg">
        <div id="db-status-indicator" class="bg-gray-400"></div>
        <span id="db-status-text" class="text-xs text-gray-600 font-medium">正在檢查...</span>
    </div>

<script>
// --- 全域設定 ---
const backendUrl = 'https://backend1.zeabur.app'; // 您的後端服務網址

document.addEventListener('DOMContentLoaded', () => {
    // --- Tab 切換邏輯 ---
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(button => {
        button.addEventListener('click', () => {
            const tab = button.dataset.tab;

            tabButtons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');

            tabContents.forEach(content => {
                content.classList.remove('active');
                if (content.id === `${tab}-content`) {
                    content.classList.add('active');
                }
            });
        });
    });

    // --- 全域狀態檢查 ---
    const dbStatusIndicator = document.getElementById('db-status-indicator');
    const dbStatusText = document.getElementById('db-status-text');
    async function checkDbStatus() {
        try {
            const response = await fetch(`${backendUrl}/status`);
            if (!response.ok) throw new Error('Network response was not ok');
            const data = await response.json();
            if (data.db_status === 'connected') {
                dbStatusIndicator.style.backgroundColor = '#22c55e';
                dbStatusText.textContent = '連線正常';
            } else { throw new Error(data.db_status || '連線狀態未知'); }
        } catch (error) {
            dbStatusIndicator.style.backgroundColor = '#ef4444';
            dbStatusText.textContent = '連線異常';
            console.error('DB Status Check Error:', error);
        }
    }
    checkDbStatus();


    // --- 日曆功能邏輯 (Tab 1) ---
    const calendarApp = {
        elements: {
            monthYear: document.getElementById('month-year'),
            calendarDays: document.getElementById('calendar-days'),
            prevBtn: document.getElementById('prev-month'),
            nextBtn: document.getElementById('next-month'),
            form: document.getElementById('holiday-form'),
            dateIdInput: document.getElementById('date-id'),
            nameInput: document.getElementById('holiday-name'),
            isHolidayCheck: document.getElementById('is-holiday'),
            responseMsg: document.getElementById('response-message'),
        },
        state: {
            currentDate: new Date(),
            holidaysData: {},
            selectedDateElement: null,
        },
        init() {
            this.elements.prevBtn.addEventListener('click', () => this.changeMonth(-1));
            this.elements.nextBtn.addEventListener('click', () => this.changeMonth(1));
            this.elements.form.addEventListener('submit', (e) => this.handleFormSubmit(e));
            this.fetchHolidays();
        },
        changeMonth(direction) {
            this.state.currentDate.setMonth(this.state.currentDate.getMonth() + direction);
            this.fetchHolidays();
        },
        async fetchHolidays() {
            const year = this.state.currentDate.getFullYear();
            const month = this.state.currentDate.getMonth() + 1;
            try {
                const response = await fetch(`${backendUrl}/get_holidays?year=${year}&month=${month}`);
                if (!response.ok) throw new Error('無法獲取假日資料');
                const data = await response.json();
                this.state.holidaysData = {};
                data.forEach(h => { this.state.holidaysData[h._id] = h; });
                this.render();
            } catch (error) {
                console.error('Fetch holidays error:', error);
                this.elements.responseMsg.textContent = `讀取錯誤: ${error.message}`;
            }
        },
        render() {
            const year = this.state.currentDate.getFullYear();
            const month = this.state.currentDate.getMonth();
            this.elements.monthYear.textContent = `${year}年 ${month + 1}月`;
            this.elements.calendarDays.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) this.elements.calendarDays.appendChild(document.createElement('div'));

            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'calendar-day h-10 flex items-center justify-center cursor-pointer';
                const tempDate = new Date(year, month, day);
                const dateId = `${year}${String(month + 1).padStart(2, '0')}${String(day).padStart(2, '0')}`;
                
                cell.textContent = day;
                cell.dataset.dateId = dateId;

                const holidayInfo = this.state.holidaysData[dateId];
                const isWeekend = tempDate.getDay() === 0 || tempDate.getDay() === 6;

                if (holidayInfo) {
                    cell.classList.add(holidayInfo.isHoliday ? 'holiday' : 'workday');
                } else if (isWeekend) {
                    cell.classList.add('weekend');
                }

                cell.addEventListener('click', () => this.selectDate(cell, dateId, isWeekend));
                this.elements.calendarDays.appendChild(cell);
            }
        },
        selectDate(cell, dateId, isWeekend) {
            if (this.state.selectedDateElement) {
                this.state.selectedDateElement.classList.remove('selected');
            }
            cell.classList.add('selected');
            this.state.selectedDateElement = cell;

            this.elements.dateIdInput.value = dateId;
            const data = this.state.holidaysData[dateId];
            this.elements.nameInput.value = data?.name || '';
            this.elements.isHolidayCheck.checked = data ? data.isHoliday : isWeekend;
        },
        async handleFormSubmit(e) {
            e.preventDefault();
            const dateId = this.elements.dateIdInput.value;
            if (!dateId) return;
            
            const data = {
                _id: dateId,
                name: this.elements.nameInput.value,
                isHoliday: this.elements.isHolidayCheck.checked
            };
            
            this.elements.responseMsg.textContent = '儲存中...';
            try {
                const response = await fetch(`${backendUrl}/update_holiday`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data),
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '儲存失敗');
                this.elements.responseMsg.textContent = result.message || '儲存成功！';
                this.fetchHolidays();
            } catch (error) {
                this.elements.responseMsg.textContent = `錯誤: ${error.message}`;
            }
        }
    };
    calendarApp.init();


    // --- 管理員日誌功能邏輯 (Tab 2) ---
    const adminLogsApp = {
        elements: {
            secretInput: document.getElementById('admin-secret'),
            fetchBtn: document.getElementById('fetch-logs-btn'),
            outputDiv: document.getElementById('logs-output'),
        },
        init() {
            this.elements.fetchBtn.addEventListener('click', () => this.fetchLogs());
        },
        async fetchLogs() {
            const secret = this.elements.secretInput.value;
            if (!secret) {
                this.renderError('請輸入管理員密碼');
                return;
            }
            
            this.elements.outputDiv.innerHTML = `<p class="text-gray-500">正在查詢中...</p>`;
            
            try {
                const apiUrl = `${backendUrl}/admin/api/decompression-logs?secret=${encodeURIComponent(secret)}`;
                const response = await fetch(apiUrl);
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || `HTTP 錯誤: ${response.status}`);
                }
                
                this.renderLogs(data);

            } catch (error) {
                this.renderError(error.message);
                console.error("讀取 API 失敗:", error);
            }
        },
        renderError(message) {
            this.elements.outputDiv.innerHTML = `<p class="text-red-500 font-medium">查詢失敗: ${message}</p>`;
        },
        renderLogs(logs) {
            if (logs.length === 0) {
                this.elements.outputDiv.innerHTML = `<p class="text-gray-500">找不到任何日誌紀錄。</p>`;
                return;
            }
            
            this.elements.outputDiv.innerHTML = logs.map(log => `
                <div class="log-entry">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${log.ip_address}</p>
                            <p class="text-sm text-gray-500">總共 ${log.count} 次活動</p>
                        </div>
                        <p class="text-xs text-gray-400">最近活動: ${new Date(log.last_activity).toLocaleString()}</p>
                    </div>
                    <div class="mt-4 space-y-2">
                        <h4 class="font-semibold text-sm">檔案列表:</h4>
                        <ul class="list-disc list-inside text-sm text-gray-600 space-y-1">
                            ${log.files.map(file => `
                                <li>
                                    <strong>${file.original_filename}</strong> -> ${file.filename}
                                    <span class="text-xs text-gray-400 ml-2">(${new Date(file.timestamp).toLocaleString()})</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                </div>
            `).join('');
        }
    };
    adminLogsApp.init();
});
</script>
</body>
</html>
